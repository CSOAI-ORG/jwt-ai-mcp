name: jwt-ai-mcp
description: 'Jwt Ai MCP server. Tools: decode jwt, validate jwt, generate jwt. Built
  by MEOK AI Labs.'
version: 1.0.0
tools:
- name: decode_jwt
  description: Decode a JWT token and show header, payload, signature.
  parameters:
  - name: token
    type: string
    required: true
- name: validate_jwt
  description: Validate JWT signature and expiration.
  parameters:
  - name: token
    type: string
    required: true
  - name: secret
    type: string
    required: false
- name: generate_jwt
  description: Generate a signed JWT token.
  parameters:
  - name: payload
    type: string
    required: true
  - name: secret
    type: string
    required: true
  - name: algorithm
    type: string
    required: false
- name: inspect_claims
  description: Inspect JWT claims — issuer, audience, expiration, custom claims.
  parameters:
  - name: token
    type: string
    required: true
